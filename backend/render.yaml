# Render Blueprint — deploy backend ฟรี (ไม่ต้องมี disk)
# DB ใช้ Turso (libSQL) + รูปใช้ Cloudinary → ไม่ต้องเก็บไฟล์บนเครื่อง
services:
  - type: web
    name: portfolio-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true # Render สุ่มให้อัตโนมัติ
      - key: ADMIN_USERNAME
        sync: false # กรอกเองในแดชบอร์ด
      - key: ADMIN_PASSWORD
        sync: false # กรอกเองในแดชบอร์ด
      - key: CORS_ORIGIN
        sync: false # ใส่โดเมน Vercel ของคุณ
      - key: TURSO_DATABASE_URL
        sync: false # จาก Turso (libsql://...)
      - key: TURSO_AUTH_TOKEN
        sync: false # จาก Turso
      - key: CLOUDINARY_URL
        sync: false # จาก Cloudinary (cloudinary://...)
      # อีเมลแจ้งเตือน (ทางเลือก)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
